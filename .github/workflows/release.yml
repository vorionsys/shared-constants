name: Release

# Publishes packages whenever a Changesets "Version Packages" PR is merged to main.
# - Builds, then either opens/updates the version PR or publishes the pending releases.
# - Every publish carries npm provenance (Sigstore-backed, verifiable on npmjs.com).
#
# Auth: tokenless OIDC trusted publishing — no NPM_TOKEN stored anywhere.
# npm handles the OIDC exchange natively (requires npm >= 11.5.1).

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write        # create the Version Packages PR / tags
  pull-requests: write   # open/update that PR
  id-token: write        # REQUIRED: OIDC token for npm provenance / trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Changesets needs full history

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # No registry-url — prevents setup-node from writing _authToken to .npmrc,
          # which would intercept npm's native OIDC exchange.

      - name: Update npm (OIDC trusted publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      - run: npm audit signatures

      - name: Create Version PR (if changesets present)
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          # publish omitted — npm publishes directly below so it owns the OIDC exchange
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm via OIDC (if Version PR was just merged)
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
